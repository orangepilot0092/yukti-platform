services:
  db:
    image: postgres:15-alpine
    container_name: yukti_postgres_dev
    environment:
      - POSTGRES_USER=yukti_user
      - POSTGRES_PASSWORD=yukti_password_secure
      - POSTGRES_DB=yukti_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: yukti_backend_dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://yukti_user:yukti_password_secure@db:5432/yukti_db
    depends_on:
      - db

  enterprise_gateway:
    build: ./enterprise-gateway
    container_name: yukti_java_gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - backend

volumes:
  postgres_data:
