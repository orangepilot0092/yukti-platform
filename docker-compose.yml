services:
  db:
    image: postgres:15-alpine
    container_name: yukti_postgres_dev
    command: postgres -c max_connections=100 -c shared_buffers=256MB -c effective_cache_size=1GB
    environment:
      - POSTGRES_USER=yukti_user
      - POSTGRES_PASSWORD=yukti_password_secure
      - POSTGRES_DB=yukti_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: yukti_pgbouncer
    environment:
      - DATABASE_URL=postgres://yukti_user:yukti_password_secure@db:5432/yukti_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=5000
      - DEFAULT_POOL_SIZE=30
      - MIN_POOL_SIZE=10
      - RESERVE_POOL_SIZE=5
      - SERVER_IDLE_TIMEOUT=600
      - AUTH_TYPE=scram-sha-256
    ports:
      - "6432:6432"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: yukti_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: yukti_backend_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://yukti_user:yukti_password_secure@pgbouncer:6432/yukti_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - pgbouncer
      - redis

  celery_worker:
    build: ./backend
    container_name: yukti_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://yukti_user:yukti_password_secure@pgbouncer:6432/yukti_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - pgbouncer
      - redis

  # NEW: Enterprise Scheduler for 24/7 Lead Nurturing
  celery_beat:
    build: ./backend
    container_name: yukti_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://yukti_user:yukti_password_secure@pgbouncer:6432/yukti_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  enterprise_gateway:
    build: ./enterprise-gateway
    container_name: yukti_java_gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - backend

volumes:
  postgres_data:
